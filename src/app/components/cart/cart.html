<section class="cart-section" id="cart">
  <div class="container">
    <h2>Your Cart</h2>

    <div class="empty-cart" *ngIf="cartService.items.length === 0">
      Your cart is empty. Click Order Now to add food.
    </div>

    <div class="cart-box" *ngIf="cartService.items.length > 0">
      <div class="cart-item" *ngFor="let item of cartService.items">
        <div>
          <h3>{{ item.name }}</h3>
          <p>Quantity: {{ item.quantity }}</p>
        </div>

        <div class="cart-actions">
          <p>₹{{ item.priceValue * item.quantity }}</p>

          <button type="button" (click)="cartService.removeFromCart(item.name)">
            Remove
          </button>
        </div>
      </div>

      <div class="cart-total">
        <h3>Total: ₹{{ cartService.getTotalAmount() }}</h3>

        <button type="button" (click)="cartService.clearCart()">
          Clear Cart
        </button>
      </div>
    </div>
  </div>
</section>
