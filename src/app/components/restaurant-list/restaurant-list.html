<section class="restaurants">
  <div class="container">
    <div class="section-title">
      <h2>Top restaurants near you</h2>
      <p>Discover popular places delivering around your location</p>
    </div>

    <div class="restaurant-grid">
      <div class="restaurant-card" *ngFor="let restaurant of restaurants">
        <img [src]="restaurant.image" [alt]="restaurant.name">

        <div class="content">
          <h3>{{ restaurant.name }}</h3>

          <p class="cuisine">
            {{ restaurant.cuisine }}
          </p>

          <div class="details">
            <span class="rating">
              ★ {{ restaurant.rating }}
            </span>

            <span>
              {{ restaurant.time }}
            </span>
          </div>

          <p class="price">
            {{ restaurant.price }}
          </p>

          <button type="button" (click)="orderNow(restaurant)">
            Order Now
          </button>
        </div>
      </div>
    </div>
  </div>
</section>
